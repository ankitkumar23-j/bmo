      { q: "Payment election changes must be made from where?", opts: ["Any personal device", "Inside the BMO Network only", "A BMO branch in person only", "By phone to HRC"], correct: 1 },
      { q: "How many bank accounts can a US employee split direct deposit across?", opts: ["1", "2", "3", "Unlimited"], correct: 2 },
      { q: "Which of these is a POST-tax deduction, not a pre-tax one?", opts: ["RSP contributions (Canada)", "401(k) contributions (US)", "Life insurance premiums (Canada)", "ESOP contributions (Canada)"], correct: 2 },
      { q: "T2200 is used for which purpose?", opts: ["US W-2 corrections", "Canadian work-from-home expense claims", "Garnishment submissions", "STIP eligibility verification"], correct: 1 },
      { q: "Imputed income (e.g. a gift card award) is taxed:", opts: ["Only at year-end", "Each pay period, as it's recorded", "Never — it's tax-exempt", "Only if over $500"], correct: 1 },
      { q: "Who is EXCLUDED from Off-Cycle Pay eligibility structure — i.e., cannot personally request it?", opts: ["Managers", "HRBPs", "Standard employees acting alone", "US Leaves Administration"], correct: 2 },
      { q: "BMO Canada's business units include which of the following?", opts: ["BMO Harris", "Bank of the West", "Air Miles", "Nesbitt Burns Trust"], correct: 2 },
      { q: "A Contractual employee's profile is marked with which suffix?", opts: ["(T) for Temporary", "(C)", "(X)", "No marking is used"], correct: 1 },
      { q: "In the Weekly Timesheet model, hours between Schedule Hours and the OT Threshold are called:", opts: ["Overtime", "Additional", "Premium", "Standby"], correct: 1 },
      { q: "What pay rate applies to true Overtime (hours above the OT Threshold)?", opts: ["1.0x — straight time", "1.15x", "1.5x", "2.0x"], correct: 2 },
      { q: "The Pay Calendar tool's cut-off day toggle exists because:", opts: ["The manual was simply wrong and Monday is now confirmed correct", "The documented source (Sunday) conflicts with a reported real-world experience (Monday), and neither has been confirmed as definitively correct", "Canada uses Sunday and the US uses Monday", "It's a seasonal difference"], correct: 1 },
      { q: "The Medicare tax section contains an internal inconsistency about what?", opts: ["The 1.45% employee rate itself", "Whether there's a wage cap — one part of the source says no cap, another references a $200,000 threshold", "Whether employers match the deduction", "The FICA acronym definition"], correct: 1 },
      { q: "In the confirmed payroll worked example, what is Holiday Worked pay calculated as?", opts: ["Hours × rate (straight time)", "Hours × rate × 1.5", "Hours × rate × 2.0", "A flat daily amount"], correct: 1 },
      { q: "What does FTE stand for, and how is Hourly Rate derived from it?", opts: ["Full-Time Employee; Hourly Rate = Annual Salary ÷ 2000", "Full-Time Equivalent; Hourly Rate = Bi-Weekly Pay ÷ Standard Hours", "Fixed-Term Employee; not used in rate calculations", "Full Tax Exemption; unrelated to pay rate"], correct: 1 },
      { q: "Which garnishment category is Canada-specific (not found in the US list)?", opts: ["IRS Tax Levies", "Wage Assignments (Credit Unions)", "Bankruptcy Orders", "Administrative Wage Garnishment"], correct: 1 },
      { q: "What is the combined Canada Maternity/Parental leave maximum, and the father-alone cap?", opts: ["78 weeks combined; father capped at 63", "52 weeks combined; father capped at 26", "78 weeks combined; no father cap", "104 weeks combined; father capped at 52"], correct: 0 },
      { q: "BMO's Mat/Pat top-up covers how many weeks?", opts: ["All weeks of leave", "First 12 weeks only", "First 26 weeks", "Only if EI is denied"], correct: 1 },
      { q: "An employee's salary is $2,000 and EI pays $1,500. What does BMO's top-up formula give them?", opts: ["$1,500 total", "$2,000 total ($500 top-up)", "$3,500 total", "$500 total"], correct: 1 },
      { q: "How long after the first pay interruption is the ROE sent to Service Canada?", opts: ["Same day", "5-7 days", "14 days", "30 days"], correct: 1 },
      { q: "Compassionate Care Leave: total duration vs. maximum payable via EI?", opts: ["28 weeks total, 26 weeks payable", "26 weeks total, 28 weeks payable", "52 weeks total, 26 weeks payable", "12 weeks total, 12 weeks payable"], correct: 0 },
      { q: "Canada STD pay structure across its 26-week duration:", opts: ["100% for all 26 weeks", "Weeks 1-8 at 100%, weeks 9-26 at 75%", "75% for all 26 weeks, no tiers", "50% flat rate throughout"], correct: 1 },
      { q: "In Canada, LTD deductions stop at what age, though LTD itself ends at 65?", opts: ["60", "62", "64.5", "65"], correct: 2 },
      { q: "Can an employee contribute to ESOP while on LTD (Canada)?", opts: ["Yes, at a reduced rate", "No", "Only in the first 6 months", "Only with manager approval"], correct: 1 },
      { q: "General Unpaid LOA (Canada) caps at how many weeks?", opts: ["26 weeks", "52 weeks", "104 weeks", "No cap"], correct: 2 },
      { q: "Education Leave (Canada) requires how many years of service?", opts: ["1 year", "3 years", "5 years", "10 years"], correct: 2 },
      { q: "USA Maternity/Parental leave: how many weeks, at what pay rate?", opts: ["12 weeks at 60%", "16 weeks at 100% of Base Salary/BBR", "26 weeks at 75%", "8 weeks at 100%"], correct: 1 },
      { q: "USA STD: how many unpaid waiting days before STD begins?", opts: ["3 days", "5 days", "10 days", "14 days"], correct: 2 },
      { q: "USA LTD eligibility begins after how many consecutive business days, and replaces what percentage of pay?", opts: ["90 days, 50%", "110 days, 60%", "120 days, 75%", "60 days, 40%"], correct: 1 },
      { q: "Canada Sick Time: what's the trigger to apply for STD instead of continuing on sick leave?", opts: ["Any absence over 1 day", "Absence over 5 business days", "Absence over 10 business days", "There is no trigger — sick leave has no limit"], correct: 1 },
      { q: "USA Sick Time: what three numbers are internally consistent (grant + carryover = cap)?", opts: ["40 + 100 = 140", "80 + 200 = 280", "60 + 150 = 210", "100 + 300 = 400"], correct: 1 },
      { q: "A USA employee hired in August — how many sick hours in their first partial year?", opts: ["80 hours", "40 hours", "24 hours", "0 hours"], correct: 1 },
      { q: "Bereavement leave (Canada): total days, and paid/unpaid split?", opts: ["5 days, all paid", "10 days — 5 paid, 5 unpaid", "10 days, all unpaid", "15 days — 10 paid, 5 unpaid"], correct: 1 },
    ];

    const CATEGORIES = ["All", ...Array.from(new Set(TOPICS.map(t => t.category)))];

    const CAT_COLORS = {
      "General": "#5b7a99", "Benefits": "#6a8f5f", "Compensation": "#8A6D3B", "Onboarding": "#7a6a9e",
      "Deductions": "#a05a5a", "Canadian Tax": "#3f7d8c", "US Tax": "#8c5a3f", "Tax Reporting": "#5a6b8c",
      "Payroll Ops": "#1f2a44", "Legal": "#7d3f5c",
    };
    function catColor(cat) { return CAT_COLORS[cat] || "#666"; }

    function App() {
      const [view, setView] = useState("browse");
      const [search, setSearch] = useState("");
      const [category, setCategory] = useState("All");
      const [openId, setOpenId] = useState(null);
      const [quizIdx, setQuizIdx] = useState(0);
      const [quizAnswered, setQuizAnswered] = useState(false);
      const [quizSelected, setQuizSelected] = useState(null);
      const [quizScore, setQuizScore] = useState(0);
      const [quizDone, setQuizDone] = useState(false);

      const filtered = useMemo(() => {
        return TOPICS.filter(t => {
          const matchCat = category === "All" || t.category === category;
          const s = search.toLowerCase();
          const matchSearch = !s || t.title.toLowerCase().includes(s) || t.body.toLowerCase().includes(s) ||
            (t.facts || []).some(f => f.toLowerCase().includes(s)) || (t.rule || "").toLowerCase().includes(s);
          return matchCat && matchSearch;
        });
      }, [search, category]);

      const flaggedCount = TOPICS.filter(t => t.flagged).length;
      const priorityCount = TOPICS.filter(t => t.priority).length;

      function answerQuiz(idx) {
        if (quizAnswered) return;
        setQuizSelected(idx);
        setQuizAnswered(true);
        if (idx === QUIZ[quizIdx].correct) setQuizScore(s => s + 1);
      }
      function nextQuiz() {
        setQuizSelected(null);
        setQuizAnswered(false);
        if (quizIdx + 1 < QUIZ.length) setQuizIdx(i => i + 1);
        else setQuizDone(true);
      }
      function restartQuiz() {
        setQuizIdx(0); setQuizAnswered(false); setQuizSelected(null); setQuizScore(0); setQuizDone(false);
      }

      const NOTES_KEY = "bmo_hrfs_notes_v1";
      const [notes, setNotes] = useState(() => {
        try {
          const raw = localStorage.getItem(NOTES_KEY);
          return raw ? JSON.parse(raw) : {};
        } catch (e) { return {}; }
      });
      const [draftText, setDraftText] = useState({});
      const [draftImages, setDraftImages] = useState({});
      const [listeningTopic, setListeningTopic] = useState(null);
      const [voiceSupported] = useState(() => typeof window !== "undefined" && (window.SpeechRecognition || window.webkitSpeechRecognition));
      const recognitionRef = useRef(null);

      function toggleVoiceInput(topicId) {
        if (!voiceSupported) {
          alert("Voice input isn't supported in this browser. It works in Chrome and Edge — try one of those, or just type your note.");
          return;
        }
        if (listeningTopic === topicId) {
          recognitionRef.current && recognitionRef.current.stop();
          setListeningTopic(null);
          return;
        }
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new SR();
        rec.continuous = true;
        rec.interimResults = false;
        rec.lang = "en-US";
        rec.onresult = (e) => {
          let transcript = "";
          for (let i = e.resultIndex; i < e.results.length; i++) {
            transcript += e.results[i][0].transcript;
          }
          setDraftText(prev => ({ ...prev, [topicId]: ((prev[topicId] || "") + " " + transcript).trim() }));
        };
        rec.onerror = () => setListeningTopic(null);
        rec.onend = () => setListeningTopic(null);
        recognitionRef.current = rec;
        rec.start();
        setListeningTopic(topicId);
      }
      const [importMsg, setImportMsg] = useState("");

      function persistNotes(next) {
        setNotes(next);
        try { localStorage.setItem(NOTES_KEY, JSON.stringify(next)); }
        catch (e) { alert("Could not save — your browser's local storage may be full. Try removing an old image-heavy note, or use Export to back up first."); }
      }

      function compressImage(file, maxWidth = 900, quality = 0.72) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              const scale = Math.min(1, maxWidth / img.width);
              const canvas = document.createElement("canvas");
              canvas.width = img.width * scale;
              canvas.height = img.height * scale;
              const ctx = canvas.getContext("2d");
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              resolve(canvas.toDataURL("image/jpeg", quality));
            };
            img.onerror = reject;
            img.src = e.target.result;
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      async function handleImagePick(topicId, fileList) {
        const files = Array.from(fileList || []);
        const compressed = await Promise.all(files.map(f => compressImage(f)));
        setDraftImages(prev => ({ ...prev, [topicId]: [...(prev[topicId] || []), ...compressed] }));
      }

      function removeDraftImage(topicId, idx) {
        setDraftImages(prev => ({ ...prev, [topicId]: (prev[topicId] || []).filter((_, i) => i !== idx) }));
      }

      function saveNote(topicId) {
        const text = (draftText[topicId] || "").trim();
        const images = draftImages[topicId] || [];
        if (!text && images.length === 0) return;
        const entry = { id: Date.now(), text, images, createdAt: new Date().toISOString() };
        const next = { ...notes, [topicId]: [...(notes[topicId] || []), entry] };
        persistNotes(next);
        setDraftText(prev => ({ ...prev, [topicId]: "" }));
        setDraftImages(prev => ({ ...prev, [topicId]: [] }));
      }

      function deleteNote(topicId, noteId) {
        const next = { ...notes, [topicId]: (notes[topicId] || []).filter(n => n.id !== noteId) };
        persistNotes(next);
      }

      function exportNotes() {
        const blob = new Blob([JSON.stringify(notes, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `bmo-hrfs-notes-backup-${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      function importNotes(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const imported = JSON.parse(e.target.result);
            const merged = { ...notes };
            Object.keys(imported).forEach(topicId => {
              merged[topicId] = [...(merged[topicId] || []), ...imported[topicId]];
            });
            persistNotes(merged);
            setImportMsg(`Imported notes for ${Object.keys(imported).length} topic(s).`);
            setTimeout(() => setImportMsg(""), 4000);
          } catch (err) {
            setImportMsg("Import failed — that file doesn't look like a valid notes backup.");
            setTimeout(() => setImportMsg(""), 4000);
          }
        };
        reader.readAsText(file);
      }

      const totalNoteCount = Object.values(notes).reduce((sum, arr) => sum + arr.length, 0);

      const serif = "'Iowan Old Style', 'Palatino Linotype', Georgia, 'Times New Roman', serif";
      const sans = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif";

      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(180deg, #f7f5f0 0%, #f1ede3 100%)", fontFamily: sans, color: "#1c1c1c" }}>
          <style>{`
            @media print {
              .no-print { display: none !important; }
              .print-only { display: block !important; }
              body { background: #fff !important; }
            }
            .print-only { display: none; }
          `}</style>

          <header className="no-print" style={{ background: "linear-gradient(135deg, #17213a 0%, #1f2a44 60%, #253355 100%)", color: "#fff", padding: "0", boxShadow: "0 2px 12px rgba(0,0,0,0.18)", position: "sticky", top: 0, zIndex: 20 }}>
            <div style={{ maxWidth: 1080, margin: "0 auto", padding: "22px 28px 18px 28px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 16 }}>
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 34, height: 34, borderRadius: 8, background: "linear-gradient(135deg, #c9a86a, #8A6D3B)", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: serif, fontWeight: "bold", fontSize: 17, color: "#17213a", flexShrink: 0 }}>B</div>
                    <div>
                      <div style={{ fontSize: 23, fontWeight: 700, fontFamily: serif, letterSpacing: "0.2px" }}>HRFS Study Reference</div>
                      <div style={{ fontSize: 12.5, color: "#c9a86a", letterSpacing: "0.4px", marginTop: 1 }}>CROSS-BORDER PAYROLL, BENEFITS &amp; COMPLIANCE</div>
                    </div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
                  <button onClick={() => window.print()} style={{ padding: "8px 16px", borderRadius: 7, border: "1px solid rgba(255,255,255,0.3)", background: "rgba(255,255,255,0.08)", color: "#fff", fontSize: 12.5, fontWeight: 600, cursor: "pointer" }}>
                    📄 Download Full Session (PDF)
                  </button>
                  <div style={{ display: "flex", gap: 6, background: "rgba(255,255,255,0.07)", padding: 5, borderRadius: 11 }}>
                    {[["browse", "Browse"], ["kb", "KB Index"], ["calc", "Calculators"], ["quiz", "Quiz"], ["notes", "My Notes"]].map(([key, label]) => (
                      <button key={key} onClick={() => setView(key)} style={{
                        padding: "8px 18px", borderRadius: 7, border: "none", cursor: "pointer", fontSize: 13.5,
                        fontWeight: view === key ? 700 : 500, letterSpacing: "0.2px",
                        background: view === key ? "#c9a86a" : "transparent",
                        color: view === key ? "#17213a" : "rgba(255,255,255,0.75)",
                        transition: "all 0.15s ease"
                      }}>{label}{key === "notes" && totalNoteCount > 0 ? ` (${totalNoteCount})` : ""}</button>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{ display: "flex", gap: 20, marginTop: 16, fontSize: 12.5, color: "rgba(255,255,255,0.55)" }}>
                <span>{TOPICS.length} topics</span>
                <span>·</span>
                <span>{KB_INDEX.length} KB references</span>
                <span>·</span>
                <span style={{ color: flaggedCount ? "#e0a3a3" : "inherit" }}>{flaggedCount} flagged</span>
                <span>·</span>
                <span style={{ color: "#c9a86a" }}>★ {priorityCount} priority</span>
                <span>·</span>
                <span>{totalNoteCount} note{totalNoteCount === 1 ? "" : "s"} saved</span>
              </div>
            </div>
          </header>

          <div className="no-print" style={{ background: "#fdf6e3", borderBottom: "1px solid #e8dcb0", padding: "8px 28px", fontSize: 12, color: "#7a5f1f", textAlign: "center" }}>
            📌 Notes and images are saved only in <strong>this browser</strong> — they don't sync across devices and aren't visible to anyone else. Use Export in the My Notes tab to back them up.
          </div>

          <main className="no-print" style={{ maxWidth: 1080, margin: "0 auto", padding: "28px 28px 60px 28px" }}>

            {view === "browse" && (
              <div>
                <div style={{ display: "flex", gap: 10, marginBottom: 18, flexWrap: "wrap", alignItems: "center" }}>
                  <div style={{ position: "relative", flex: "1 1 260px" }}>
                    <span style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", color: "#999", fontSize: 15 }}>⌕</span>
                    <input
                      value={search}
                      onChange={e => setSearch(e.target.value)}
                      placeholder="Search topics, rules, KB numbers..."
                      style={{ width: "100%", padding: "12px 14px 12px 38px", borderRadius: 10, border: "1px solid #ddd6c8", fontSize: 14.5, background: "#fff", boxShadow: "0 1px 3px rgba(0,0,0,0.04)", outline: "none" }}
                    />
                  </div>
                </div>

                <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
                  {CATEGORIES.map(c => (
                    <button key={c} onClick={() => setCategory(c)} style={{
                      padding: "6px 14px", borderRadius: 20, fontSize: 12.5, cursor: "pointer", fontWeight: 600,
                      border: category === c ? "1px solid transparent" : "1px solid #ddd6c8",
                      background: category === c ? (c === "All" ? "#1f2a44" : catColor(c)) : "#fff",
                      color: category === c ? "#fff" : "#555",
                      transition: "all 0.15s ease"
                    }}>{c}</button>
                  ))}
                </div>

                {flaggedCount > 0 && (
                  <div style={{ background: "#fdf1f1", border: "1px solid #e8c4c4", borderRadius: 10, padding: "12px 16px", marginBottom: 18, fontSize: 13, color: "#9a3f3f", display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 16 }}>⚠</span>
                    <span>{flaggedCount} topic{flaggedCount > 1 ? "s" : ""} below have unresolved data conflicts, marked with a red border.</span>
                  </div>
                )}

                <div style={{ fontSize: 12.5, color: "#8a8577", marginBottom: 14, fontWeight: 600, letterSpacing: "0.3px" }}>{filtered.length} OF {TOPICS.length} TOPICS</div>

                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {filtered.map(t => {
                    const isOpen = openId === t.id;
                    return (
                      <div key={t.id} style={{
                        background: "#fff", borderRadius: 12,
                        border: t.flagged ? "1.5px solid #d99b9b" : (t.priority ? "1.5px solid #c9a86a" : "1px solid #e6e1d6"),
                        overflow: "hidden", boxShadow: isOpen ? "0 4px 16px rgba(0,0,0,0.07)" : "0 1px 3px rgba(0,0,0,0.03)",
                        transition: "box-shadow 0.2s ease"
                      }}>
                        <button onClick={() => setOpenId(isOpen ? null : t.id)} style={{
                          width: "100%", textAlign: "left", padding: "16px 20px", background: "none", border: "none", cursor: "pointer",
                          display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12
                        }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 12, minWidth: 0 }}>
                            <div style={{
                              width: 4, height: 34, borderRadius: 3, background: catColor(t.category), flexShrink: 0
                            }} />
                            <div style={{ minWidth: 0 }}>
                              <div style={{ display: "flex", alignItems: "baseline", gap: 8, flexWrap: "wrap" }}>
                                <span style={{ fontFamily: serif, fontSize: 11.5, color: "#a89968", fontWeight: 600 }}>§{t.num}</span>
                                <span style={{ fontWeight: 700, fontSize: 16, color: "#1f2a44", fontFamily: serif }}>{t.priority ? "★ " : ""}{t.title}</span>
                              </div>
                              {t.flagged && <span style={{ fontSize: 10.5, color: "#b23a3a", fontWeight: 700, letterSpacing: "0.4px" }}>⚠ FLAGGED FOR REVIEW</span>}
                            </div>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
                            <span style={{ fontSize: 11, color: "#fff", background: catColor(t.category), padding: "4px 10px", borderRadius: 20, fontWeight: 600, whiteSpace: "nowrap" }}>{t.category}</span>
                            <span style={{ fontSize: 13, color: "#bbb", transform: isOpen ? "rotate(90deg)" : "none", transition: "transform 0.15s ease", display: "inline-block" }}>›</span>
                          </div>
                        </button>
                        {isOpen && (
                          <div style={{ padding: "0 20px 20px 20px" }}>
                            <div style={{ height: 1, background: "#f0ece0", marginBottom: 14 }} />
                            <p style={{ fontSize: 14.5, lineHeight: 1.65, margin: "0 0 12px 0", color: "#333" }}>{t.body}</p>
                            {t.rule && (
                              <div style={{ background: "#faf7f0", borderLeft: "3px solid #c9a86a", borderRadius: "0 6px 6px 0", padding: "11px 15px", marginBottom: 12, fontSize: 13.5, lineHeight: 1.6 }}>
                                <strong style={{ color: "#8A6D3B" }}>Rule — </strong>{t.rule}
                              </div>
                            )}
                            {t.facts && (
                              <ul style={{ fontSize: 13.5, lineHeight: 1.8, paddingLeft: 20, margin: "0 0 12px 0", color: "#444" }}>
                                {t.facts.map((f, i) => <li key={i}>{f}</li>)}
                              </ul>
                            )}
                            {t.flagged && (
                              <div style={{ background: "#fdf1f1", borderLeft: "3px solid #b23a3a", borderRadius: "0 6px 6px 0", padding: "11px 15px", fontSize: 13, color: "#8a2f2f", lineHeight: 1.6 }}>
                                <strong>⚠ Flagged for review — </strong>{t.flagNote}
                              </div>
                            )}

                            <div style={{ marginTop: 18, paddingTop: 16, borderTop: "1px dashed #ddd6c8" }}>
                              <div style={{ fontSize: 12, fontWeight: 700, color: "#8a8577", letterSpacing: "0.3px", marginBottom: 10 }}>
                                YOUR NOTES {(notes[t.id] || []).length > 0 ? `(${notes[t.id].length})` : ""}
                              </div>

                              {(notes[t.id] || []).map(n => (
                                <div key={n.id} style={{ background: "#faf8f3", border: "1px solid #eee7d6", borderRadius: 8, padding: "10px 12px", marginBottom: 8 }}>
                                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                                    <p style={{ fontSize: 13.5, margin: 0, color: "#333", whiteSpace: "pre-wrap", flex: 1 }}>{n.text}</p>
                                    <button onClick={() => deleteNote(t.id, n.id)} style={{ border: "none", background: "none", color: "#b23a3a", cursor: "pointer", fontSize: 12, flexShrink: 0 }}>✕ delete</button>
                                  </div>
                                  {n.images && n.images.length > 0 && (
                                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 8 }}>
                                      {n.images.map((src, i) => (

                                    </div>
                                  )}
                                  <div style={{ fontSize: 10.5, color: "#aaa", marginTop: 6 }}>{new Date(n.createdAt).toLocaleString()}</div>
                                </div>
                              ))}

                              <textarea
                                value={draftText[t.id] || ""}
                                onChange={e => setDraftText(prev => ({ ...prev, [t.id]: e.target.value }))}

                              </div>

                  <div key={kb} style={{
                    display: "flex", padding: "13px 22px", fontSize: 13.5, alignItems: "center",

            {view === "quiz" && (

                              <p style={{ fontSize: 13.5, margin: 0, color: "#333", whiteSpace: "pre-wrap", flex: 1 }}>{n.text}</p>
                              <button onClick={() => deleteNote(t.id, n.id)} style={{ border: "none", background: "none", color: "#b23a3a", cursor: "pointer", fontSize: 12, flexShrink: 0 }}>✕ delete</button>

                                {n.images.map((src, i) => <img key={i} src={src} alt="" style={{ width: 70, height: 70, objectFit: "cover", borderRadius: 6, border: "1px solid #ddd" }} />)}
                              </div>
                            )}
                            <div style={{ fontSize: 10.5, color: "#aaa", marginTop: 6 }}>{new Date(n.createdAt).toLocaleString()}</div>
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {view === "calc" && <CalculatorSuite serif={serif} sans={sans} />}

          </main>

          <footer className="no-print" style={{ textAlign: "center", padding: "24px", fontSize: 12, color: "#a39d8c", borderTop: "1px solid #e6e1d6" }}>
            Reflects material compiled from training notes and screenshots. Flagged items are unresolved — verify against BMO's live systems before operational use.
          </footer>

          <div className="print-only">

      );
    }

            {[["payroll", "Daily Payroll"], ["weekly", "Weekly Timesheet"], ["salary", "Salary Rate"], ["vacation", "Vacation Accrual"], ["leaveprorate", "Leave Proration"], ["callin", "Call-In / On-Call"], ["calendar", "Pay Calendar"]].map(([key, lbl]) => (

    function FlagNote({ children }) {
      return (
        <div style={{ background: "#fdf1f1", border: "1px solid #e8c4c4", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#9a3f3f", marginTop: 14 }}>
          ⚠ {children}
        </div>
      );
    }

    function PayrollCalc({ card, label, input, resultBig, serif }) {
      const [rate, setRate] = useState(25);
      const [hours, setHours] = useState(9);
      const [dayType, setDayType] = useState("regular"); 
      const [shiftPremium, setShiftPremium] = useState(false);
      const [shiftHours, setShiftHours] = useState(0);

      const BASE_LIMIT = 6, OT_LIMIT = 7.5;
      const h = parseFloat(hours) || 0;
      const r = parseFloat(rate) || 0;

      const base = Math.min(h, BASE_LIMIT);
      const additional = h > BASE_LIMIT ? Math.min(h, OT_LIMIT) - BASE_LIMIT : 0;
      const ot = h > OT_LIMIT ? h - OT_LIMIT : 0;

      let payout = 0;
      if (dayType === "holiday-worked") {
        payout = h * r * 1.5;
      } else if (dayType === "float-used") {
        payout = h * r;
      } else {
        payout = base * r + additional * r + ot * r * 1.5;
      }
      const premRate = r + r * 0.15;
      const shiftAmt = shiftPremium ? (parseFloat(shiftHours) || 0) * premRate : 0;
      const total = payout + shiftAmt;

      return (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
          <div style={card}>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#1f2a44", fontFamily: serif, marginBottom: 16 }}>Inputs</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div>
                <label style={label}>HOURLY RATE ($)</label>
                <input type="number" value={rate} onChange={e => setRate(e.target.value)} style={input} />
              </div>
              <div>
                <label style={label}>HOURS WORKED</label>
                <input type="number" value={hours} onChange={e => setHours(e.target.value)} style={input} />
              </div>
              <div>
                <label style={label}>DAY TYPE</label>
                <select value={dayType} onChange={e => setDayType(e.target.value)} style={input}>
                  <option value="regular">Regular Shift (Base/Additional/OT tiers)</option>
                  <option value="holiday-worked">Holiday Worked (flat 1.5x)</option>
                  <option value="float-used">Float Used (flat straight time)</option>
                </select>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <input type="checkbox" checked={shiftPremium} onChange={e => setShiftPremium(e.target.checked)} />
                <label style={{ fontSize: 13 }}>Add Night Shift Premium (+15%)</label>
              </div>
              {shiftPremium && (
                <div>
                  <label style={label}>SHIFT PREMIUM HOURS</label>
                  <input type="number" value={shiftHours} onChange={e => setShiftHours(e.target.value)} style={input} />
                </div>
              )}
            </div>
          </div>

          <div style={card}>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#1f2a44", fontFamily: serif, marginBottom: 16 }}>Breakdown</div>
            {dayType === "regular" ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 10, fontSize: 13.5 }}>
                <div style={{ display: "flex", justifyContent: "space-between" }}><span>Base (≤6 hrs) — straight time</span><span>{base.toFixed(2)} hrs × ${r.toFixed(2)} = ${(base * r).toFixed(2)}</span></div>
                <div style={{ display: "flex", justifyContent: "space-between" }}><span>Additional (6–7.5 hrs)</span><span>{additional.toFixed(2)} hrs × ${r.toFixed(2)} = ${(additional * r).toFixed(2)}</span></div>
                <div style={{ display: "flex", justifyContent: "space-between" }}><span>Overtime (&gt;7.5 hrs) — 1.5x</span><span>{ot.toFixed(2)} hrs × ${(r * 1.5).toFixed(2)} = ${(ot * r * 1.5).toFixed(2)}</span></div>
                <FlagNote>The pay rate for the 6–7.5hr "Additional" band is assumed to be straight time (1.0x) — this specific rate was never explicitly confirmed in any source. Only the &gt;7.5hr overtime rate (1.5x) is verified.</FlagNote>
              </div>
            ) : (
              <div style={{ fontSize: 13.5 }}>{h.toFixed(2)} hrs × ${(dayType === "holiday-worked" ? r * 1.5 : r).toFixed(2)} = ${payout.toFixed(2)}</div>
            )}
            {shiftPremium && (
              <div style={{ marginTop: 10, fontSize: 13.5, borderTop: "1px solid #f0ece0", paddingTop: 10 }}>
                Shift Premium: {shiftHours} hrs × ${premRate.toFixed(2)} (rate + 15%) = ${shiftAmt.toFixed(2)}
              </div>
            )}
            <div style={{ marginTop: 18, paddingTop: 14, borderTop: "2px solid #1f2a44", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: "#8a8577" }}>TOTAL</span>
              <span style={resultBig}>${total.toFixed(2)}</span>
            </div>
          </div>
        </div>
      );
    }

    function WeeklyTimesheet({ card, label, input, resultBig, serif }) {
      const DAY_NAMES = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
      const [scheduleHours, setScheduleHours] = useState(6);
      const [otThreshold, setOtThreshold] = useState(7.5);
      const [rate, setRate] = useState(25);
      const [days, setDays] = useState(DAY_NAMES.map(() => 0));

      const sh = parseFloat(scheduleHours) || 0;
      const ot = parseFloat(otThreshold) || 0;
      const r = parseFloat(rate) || 0;

      function updateDay(i, val) {
        const next = [...days];
        next[i] = val;
        setDays(next);
      }

      const rows = days.map((h, i) => {
        const hrs = parseFloat(h) || 0;
        const base = Math.min(hrs, sh);
        const additional = hrs > sh ? Math.min(hrs, ot) - sh : 0;
        const overtime = hrs > ot ? hrs - ot : 0;
        const pay = base * r + additional * r + overtime * r * 1.5;
        return { day: DAY_NAMES[i], hrs, base, additional, overtime, pay };
      });

      const totals = rows.reduce((acc, row) => ({
        hrs: acc.hrs + row.hrs, base: acc.base + row.base, additional: acc.additional + row.additional,
        overtime: acc.overtime + row.overtime, pay: acc.pay + row.pay
      }), { hrs: 0, base: 0, additional: 0, overtime: 0, pay: 0 });

      return (

    function SalaryRateCalc({ card, label, input, resultBig, serif }) {

    function VacationCalc({ card, label, input, resultBig, serif }) {
      const [mode, setMode] = useState("hire");
      const [annualBase, setAnnualBase] = useState(150);
      const [monthsWorked, setMonthsWorked] = useState(9);
      const [fte1Months, setFte1Months] = useState(4);
      const [fte1Pct, setFte1Pct] = useState(100);
      const [fte2Months, setFte2Months] = useState(8);
      const [fte2Pct, setFte2Pct] = useState(50);
      const [grade1Months, setGrade1Months] = useState(4);
      const [grade1Base, setGrade1Base] = useState(112.5);
      const [grade2Months, setGrade2Months] = useState(8);
      const [grade2Base, setGrade2Base] = useState(150);
      const [loaEnabled, setLoaEnabled] = useState(false);
      const [loaMonths, setLoaMonths] = useState(7);

      const mve = (parseFloat(annualBase) || 0) / 12;
      let net = 0, steps = [];

      if (mode === "hire") {
        const m = parseFloat(monthsWorked) || 0;
        net = m * mve;
        steps = [`M.V.E = ${annualBase} ÷ 12 =${mve.toFixed(3)} hrs/month`, `${m} months × ${mve.toFixed(3)} =${net.toFixed(3)} hours`];
      } else if (mode === "fte") {
        const m1 = parseFloat(fte1Months) || 0, p1 = (parseFloat(fte1Pct) || 0) / 100;
        const m2 = parseFloat(fte2Months) || 0, p2 = (parseFloat(fte2Pct) || 0) / 100;
        const a1 = m1 * mve * p1, a2 = m2 * mve * p2;
        net = a1 + a2;
        steps = [`Period 1: ${m1} mo × ${mve.toFixed(3)} × ${(p1 * 100).toFixed(0)}\% =${a1.toFixed(3)} hrs`, `Period 2: ${m2} mo × ${mve.toFixed(3)} × ${(p2 * 100).toFixed(0)}\% =${a2.toFixed(3)} hrs`, `Total = ${a1.toFixed(3)} + ${a2.toFixed(3)} =${net.toFixed(3)} hours`];
      } else if (mode === "grade") {
        const m1 = parseFloat(grade1Months) || 0, b1 = parseFloat(grade1Base) || 0;
        const m2 = parseFloat(grade2Months) || 0, b2 = parseFloat(grade2Base) || 0;
        const a1 = m1 * (b1 / 12), a2 = m2 * (b2 / 12);
        net = a1 + a2;
        steps = [`Grade 1: ${m1} mo × (${b1} ÷ 12) =${a1.toFixed(3)} hrs`, `Grade 2: ${m2} mo × (${b2} ÷ 12) =${a2.toFixed(3)} hrs`, `Total = ${a1.toFixed(3)} + ${a2.toFixed(3)} =${net.toFixed(3)} hours`];
      }

      let deduction = 0;
      if (loaEnabled) {
        deduction = (parseFloat(loaMonths) || 0) * mve;
        net = Math.max(0, net - deduction);
      }

      return (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
          <div style={card}>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#1f2a44", fontFamily: serif, marginBottom: 16 }}>Scenario</div>
            <select value={mode} onChange={e => setMode(e.target.value)} style={{ ...input, marginBottom: 14 }}>
              <option value="hire">Hire / Termination</option>
              <option value="fte">Change in FTE (split year)</option>
              <option value="grade">Change in Job Grade (split year)</option>
            </select>

            <div>
              <label style={label}>ANNUAL BASE ALLOWANCE (HRS)</label>
              <input type="number" value={annualBase} onChange={e => setAnnualBase(e.target.value)} style={input} />
            </div>

            {mode === "hire" && (
              <div style={{ marginTop: 14 }}>
                <label style={label}>MONTHS ACTIVE</label>
                <input type="number" value={monthsWorked} onChange={e => setMonthsWorked(e.target.value)} style={input} />
              </div>
            )}

            {mode === "fte" && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 14 }}>
                <div><label style={label}>PERIOD 1 MONTHS</label><input type="number" value={fte1Months} onChange={e => setFte1Months(e.target.value)} style={input} /></div>
                <div><label style={label}>PERIOD 1 FTE %</label><input type="number" value={fte1Pct} onChange={e => setFte1Pct(e.target.value)} style={input} /></div>
                <div><label style={label}>PERIOD 2 MONTHS</label><input type="number" value={fte2Months} onChange={e => setFte2Months(e.target.value)} style={input} /></div>
                <div><label style={label}>PERIOD 2 FTE %</label><input type="number" value={fte2Pct} onChange={e => setFte2Pct(e.target.value)} style={input} /></div>
              </div>
            )}

            {mode === "grade" && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 14 }}>
                <div><label style={label}>GRADE 1 MONTHS</label><input type="number" value={grade1Months} onChange={e => setGrade1Months(e.target.value)} style={input} /></div>
                <div><label style={label}>GRADE 1 BASE (HRS)</label><input type="number" value={grade1Base} onChange={e => setGrade1Base(e.target.value)} style={input} /></div>
                <div><label style={label}>GRADE 2 MONTHS</label><input type="number" value={grade2Months} onChange={e => setGrade2Months(e.target.value)} style={input} /></div>
                <div><label style={label}>GRADE 2 BASE (HRS)</label><input type="number" value={grade2Base} onChange={e => setGrade2Base(e.target.value)} style={input} /></div>
              </div>
            )}

            <div style={{ marginTop: 16, paddingTop: 14, borderTop: "1px solid #f0ece0" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: loaEnabled ? 10 : 0 }}>
                <input type="checkbox" checked={loaEnabled} onChange={e => setLoaEnabled(e.target.checked)} />

                </div>
              )}
            </div>
          </div>

          <div style={card}>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#1f2a44", fontFamily: serif, marginBottom: 16 }}>Calculation</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8, fontSize: 13.5, color: "#444" }}>
              {steps.map((s, i) => <div key={i}>• {s}</div>)}
              {loaEnabled && <div style={{ color: "#b23a3a" }}>• LOA deduction: {loaMonths} mo × {mve.toFixed(3)} = −{deduction.toFixed(3)} hrs</div>}
            </div>
            <div style={{ marginTop: 18, paddingTop: 14, borderTop: "2px solid #1f2a44", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: "#8a8577" }}>NET ENTITLEMENT</span>
              <span style={resultBig}>{net.toFixed(2)} hrs</span>
            </div>
          </div>
        </div>
      );
    }

    function addDays(date, n) {
      const d = new Date(date);
      d.setDate(d.getDate() + n);
      return d;
    }
    function fmt(d) {
      return d.toISOString().slice(0, 10);
    }
    function nextSunday(date) {
      const d = new Date(date);
      const day = d.getDay();
      if (day !== 0) d.setDate(d.getDate() + (7 - day));
      return d;
    }

    function PayCalendar({ serif, sans }) {
      const today = new Date();
      const defaultAnchor = fmt(nextSunday(today));
      const [anchor, setAnchor] = useState(defaultAnchor);
      const [viewMonth, setViewMonth] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
      const [cutoffDay, setCutoffDay] = useState("sunday"); 

      const anchorDate = new Date(anchor + "T00:00:00");
      const cutoffOffset = cutoffDay === "monday" ? 8 : 7;
      const milestones = [
        { key: "begin", label: "Period Begin", date: anchorDate, color: "#2E8B57" },
        { key: "cutoff", label: "Cut-off", date: addDays(anchorDate, cutoffOffset), color: "#B8860B" },
        { key: "slip", label: "Pay Slip Generated", date: addDays(anchorDate, 10), color: "#6A5ACD" },
        { key: "pay", label: "PAY DATE", date: addDays(anchorDate, 12), color: "#B23A3A" },
        { key: "end", label: "Period End", date: addDays(anchorDate, 13), color: "#2E8B57" },
        { key: "exccutoff", label: "Exception Hours Cut-off", date: addDays(anchorDate, 15), color: "#B8860B" },
        { key: "excpay", label: "Exception Hours Pay Date", date: addDays(anchorDate, 26), color: "#B23A3A" },
      ];
      const milestoneByDate = {};
      milestones.forEach(m => { milestoneByDate[fmt(m.date)] = m; });

      function buildMonthGrid(monthDate) {
        const year = monthDate.getFullYear(), month = monthDate.getMonth();
        const firstDay = new Date(year, month, 1);
        const startOffset = firstDay.getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const cells = [];
        for (let i = 0; i < startOffset; i++) cells.push(null);
        for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(year, month, d));
        while (cells.length % 7 !== 0) cells.push(null);
        return cells;
      }

      const cells = buildMonthGrid(viewMonth);
      const monthLabel = viewMonth.toLocaleDateString("en-US", { month: "long", year: "numeric" });

      const label = { fontSize: 11.5, fontWeight: 700, color: "#8a8577", letterSpacing: "0.3px", display: "block", marginBottom: 6 };
      const input = { padding: "9px 11px", borderRadius: 7, border: "1px solid #ddd6c8", fontSize: 13.5, fontFamily: sans };

      return (
        <div>
          <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e6e1d6", padding: 20, marginBottom: 18 }}>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#1f2a44", fontFamily: serif, marginBottom: 4 }}>Pay Cycle Calendar</div>
            <p style={{ fontSize: 13, color: "#666", marginTop: 0, marginBottom: 14, lineHeight: 1.6 }}>
              Set a known Pay Period Begin date (must be a Sunday) and this calculates every milestone from the confirmed cycle pattern — cut-off, pay slip generation, pay date, and exception hours handling.
            </p>
            <label style={label}>PAY PERIOD BEGIN DATE (SUNDAY)</label>
            <input type="date" value={anchor} onChange={e => {
              const d = new Date(e.target.value + "T00:00:00");
              setAnchor(fmt(nextSunday(d)));
              setViewMonth(new Date(d.getFullYear(), d.getMonth(), 1));
            }} style={input} />
            {new Date(anchor + "T00:00:00").getDay() !== 0 && (
              <span style={{ fontSize: 12, color: "#b23a3a", marginLeft: 10 }}>Adjusted to the nearest Sunday.</span>
            )}

            <div style={{ marginTop: 14 }}>
              <label style={label}>CUT-OFF DAY</label>
              <select value={cutoffDay} onChange={e => setCutoffDay(e.target.value)} style={input}>
                <option value="sunday">Sunday (as documented in the training manual)</option>
                <option value="monday">Monday (as reported from direct work experience)</option>
              </select>
            </div>

            <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginTop: 16 }}>
              {milestones.map(m => (
                <div key={m.key} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
                  <span style={{ width: 10, height: 10, borderRadius: 3, background: m.color, display: "inline-block" }} />
                  <span style={{ color: "#555" }}>{m.label}: <strong>{m.date.toLocaleDateString("en-US", { month: "short", day: "numeric" })}</strong></span>
                </div>
              ))}
            </div>

            <div style={{ background: "#fdf1f1", border: "1px solid #e8c4c4", borderRadius: 8, padding: "10px 14px", marginTop: 14, fontSize: 12, color: "#9a3f3f" }}>
              ⚠ The training manual states the cut-off falls on <strong>Sunday</strong>. You've separately reported <strong>Monday</strong> from direct experience — these conflict, and the toggle above lets you view either. Whichever matches your actual paystub timing is the one to trust going forward; consider that a correction to the source document, not a settled fact this tool can resolve on its own.
            </div>
            <div style={{ background: "#fdf1f1", border: "1px solid #e8c4c4", borderRadius: 8, padding: "10px 14px", marginTop: 10, fontSize: 12, color: "#9a3f3f" }}>
              ⚠ Separately, a claim that US and Canada employees are paid on different lags (1 week vs. 2 weeks after the work period) was raised in conversation but is still <strong>not confirmed</strong> by any source reviewed — this calendar does not assume that split.
            </div>
          </div>

          <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e6e1d6", padding: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <button onClick={() => setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() - 1, 1))} style={{ border: "1px solid #ddd6c8", background: "#fff", borderRadius: 7, padding: "6px 12px", cursor: "pointer" }}>‹ Prev</button>
              <div style={{ fontSize: 16, fontWeight: 700, color: "#1f2a44", fontFamily: serif }}>{monthLabel}</div>
              <button onClick={() => setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 1))} style={{ border: "1px solid #ddd6c8", background: "#fff", borderRadius: 7, padding: "6px 12px", cursor: "pointer" }}>Next ›</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
              {["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map(d => (
                <div key={d} style={{ textAlign: "center", fontSize: 11, fontWeight: 700, color: "#8a8577", padding: "6px 0" }}>{d}</div>
              ))}
              {cells.map((d, i) => {
                const m = d ? milestoneByDate[fmt(d)] : null;
                return (
                  <div key={i} style={{
                    minHeight: 56, borderRadius: 7, padding: 6, fontSize: 12,
                    background: m ? m.color : (d ? "#faf8f3" : "transparent"),
                    color: m ? "#fff" : "#333",
                    border: d ? "1px solid " + (m ? m.color : "#eee7d6") : "none"
                  }}>
                    {d && <div style={{ fontWeight: m ? 700 : 400 }}>{d.getDate()}</div>}
                    {m && <div style={{ fontSize: 9.5, marginTop: 2, lineHeight: 1.2 }}>{m.label}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // Mount to Root Container
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
